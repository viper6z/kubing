apiVersion: v1
kind: Service
metadata:
  name: freshrss
  namespace: freshrss
spec:
  selector:
    app: freshrss
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: freshrss
data:
  POSTGRES_PASSWORD: placeholder
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: freshrss-deployment
  namespace: freshrss
  labels:
    app: freshrss
spec:
  replicas: 1
  selector:
    matchLabels:
      app: freshrss
  template:
    metadata:
      labels:
        app: freshrss
    spec:
      containers:
      - name: freshrss
        image: ghcr.io/freshrss/freshrss:1.28.1
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: 128Mi
            cpu: 100m
          limits:
            memory: 512Mi
            cpu: 500m
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: POSTGRES_PASSWORD
        - name: DB_TYPE
          value: "pgsql"
        - name: DB_HOST
          value: "postgres"
        - name: DB_PORT
          value: 5432
        - name: DB_USER
          value: "freshrss"
        - name: DB_NAME
          value: "freshrss"
        livenessProbe:
          exec:
            command:
              - php
              - cli/health.php
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
        readinessProbe:
          exec:
            command:
              - php
              - cli/health.php
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 1
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: ebs-gp3-retain
provisioner: ebs.csi.aws.com
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain
allowVolumeExpansion: true
parameters:
  type: gp3
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: freshrss
spec:
  storageClassName: "ebs-gp3-retain"
  resources:
    requests:
      storage: "5Gi"
  accessModes:
    - "ReadWriteOnce"
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: freshrss
spec:
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: freshrss
spec: 
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
    spec:
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-data
        containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-storage # This must match the name below
              mountPath: "/var/lib/postgresql/data"
          env:
            - name: POSTGRES_DB
              value: "freshrss"
            - name: POSTGRES_USER
              value: "freshrss"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: POSTGRES_PASSWORD

