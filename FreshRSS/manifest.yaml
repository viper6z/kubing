apiVersion: apps/v1
kind: Deployment
metadata:
  name: freshrss-deployment
  labels:
    app: freshrss
spec:
  replicas: 1
  selector:
    matchLabels:
      app: freshrss
  template:
    metadata:
      labels:
        app: freshrss
    spec:
      containers:
      - name: freshrss
        image: ghcr.io/freshrss/freshrss:latest
        ports:
        - containerPort: 80

