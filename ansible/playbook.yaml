- name: kubeadm install
  hosts: nodes
  become: true

  tasks:
    - name: enable ipv4 forwarding
      ansible.builtin.copy:
        content: |
          net.ipv4.ip_forward = 1
        dest: /etc/sysctl.d/k8s.conf
        owner: root
        group: root
        mode: "0644"

    - name: apply sysctl settings
      ansible.builtin.command: sysctl --system
      changed_when: false




